name = "snapmind-api"
main = "src/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[kv_namespaces]]
binding = "JOBS"
id = "978549bb1eee4b9289bcbac7e5c2df3c"

# Set these via `wrangler secret put <NAME>`
